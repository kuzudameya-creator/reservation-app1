<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約管理システム</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">

<style>

</style>
</head>

<body>

<div class="header">予約管理システム</div>

<div class="container">

<div class="card">
  <div class="section-title">予約登録</div>

  <label>名前</label>
  <input id="name" class="input">

  <div class="row">
    <div>
      <label>日付</label>
      <input type="date" id="date" class="input">
    </div>
    <div>
      <label>時間</label>
      <select id="time" class="input">
        <option value="">選択</option>
        <option>10:00</option>
        <option>11:00</option>
        <option>12:00</option>
        <option>13:00</option>
      </select>
    </div>
  </div>

  <button class="button" onclick="addReservation()">登録</button>
</div>

<div id="list"></div>

</div>

<script>
let reservations = [];

window.onload = () => {
  const saved = localStorage.getItem("reservations");
  if (saved) reservations = JSON.parse(saved);
  render();
};

function addReservation() {
  const name = document.getElementById("name").value.trim();
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if (!name || !date || !time) {
    alert("すべて入力してください");
    return;
  }

  const exists = reservations.some(r => r.date === date && r.time === time);
  if (exists) {
    alert("その時間は予約済みです");
    return;
  }

  reservations.push({
    id: Date.now(),
    name,
    date,
    time,
    status: "未対応"
  });

  save();
  render();
}

function render() {
  const list = document.getElementById("list");

  if (reservations.length === 0) {
    list.innerHTML = '<div class="empty">現在、予約データは登録されていません</div>';
    return;
  }

  reservations.sort((a, b) => a.date.localeCompare(b.date));

  let html = `
  <table class="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>名前</th>
        <th>日付</th>
        <th>時間</th>
        <th>状態</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
  `;

  reservations.forEach((r, i) => {
    html += `
      <tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.date}</td>
        <td>${r.time}</td>
        <td>
          <span class="status ${r.status === "完了" ? "done" : "todo"}">
            ${r.status}
          </span>
        </td>
        <td>
          <button onclick="toggleStatus(${i})">切替</button>
          <button class="button button-danger" onclick="deleteReservation(${i})">削除</button>
        </td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  list.innerHTML = html;
}

function toggleStatus(i) {
  reservations[i].status =
    reservations[i].status === "未対応" ? "完了" : "未対応";
  save();
  render();
}

function deleteReservation(i) {
  reservations.splice(i, 1);
  save();
  render();
}

function save() {
  localStorage.setItem("reservations", JSON.stringify(reservations));
}
</script>

</body>
</html>
