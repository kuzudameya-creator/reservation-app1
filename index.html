<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>予約管理アプリ</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css" type="text/css2">
<script src="test.js"></script>
</head>

<body>

<div class="header">予約管理アプリ</div>

<div class="container">

  <!-- フォーム -->
  <div class="card">
    <label>名前</label>
    <input type="text" id="name" class="input" placeholder="例：山田太郎">

    <div class="form-group">
      <div>
        <label>日付</label>
        <input type="date" id="date" class="input">
      </div>

      <div>
        <label>時間</label>
        <select id="time" class="input">
          <option value="">選択してください</option>
          <option>10:00</option>
          <option>11:00</option>
          <option>12:00</option>
          <option>13:00</option>
        </select>
      </div>
    </div>

    <button class="button" onclick="addReservation()">予約する</button>
  </div>

  <!-- 一覧 -->
  <div id="list"></div>

</div>
<script>
  let reservations = [];

/* ===== 初期読み込み ===== */
window.onload = function () {
  const saved = localStorage.getItem("reservations");
  if (saved) {
    reservations = JSON.parse(saved);
  }
  renderReservations();
};

/* ===== 追加 ===== */
function addReservation() {
  const name = document.getElementById("name").value.trim();
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if (!name || !date || !time) {
    alert("すべて入力してください");
    return;
  }

    alert("その時間はすでに予約されています");
    return;
  }

  reservations.push({ name, date, time });

  saveData();
  renderReservations();
  clearForm();
}

/* ===== 表示 ===== */
function renderReservations() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (reservations.length === 0) {
    list.innerHTML = '<div class="empty">予約がありません</div>';
    return;
  }

  reservations.forEach((res, index) => {
    const div = document.createElement("div");
    div.className = "reservation";

    div.innerHTML = `
      <div>
        <strong>${res.name}</strong><br>
        ${res.date} / ${res.time}
      </div>
      <button class="button button-danger" onclick="deleteReservation(${index})">削除</button>
    `;

    list.appendChild(div);
  });
}

/* ===== 削除 ===== */
function deleteReservation(index) {
  if (confirm("削除しますか？")) {
    reservations.splice(index, 1);
    saveData();
    renderReservations();
  }
}

/* ===== 保存 ===== */
function saveData() {
  localStorage.setItem("reservations", JSON.stringify(reservations));
}

/* ===== リセット ===== */
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("date").value = "";
  document.getElementById("time").value = "";
}
  
</script>


</body>
</html>
